steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/document-intelligence-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/document-intelligence-backend:latest'
      - './backend'
    id: 'build-backend'

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/document-intelligence-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/document-intelligence-frontend:latest'
      - './frontend'
    id: 'build-frontend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/document-intelligence-backend:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/document-intelligence-frontend:$COMMIT_SHA'
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Push latest tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/document-intelligence-backend:latest'
    waitFor: ['push-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/document-intelligence-frontend:latest'
    waitFor: ['push-frontend']

  # Deploy backend to Cloud Run (uncomment when ready)
  # - name: 'gcr.io/cloud-builders/gcloud'
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - 'document-intelligence-backend'
  #     - '--image'
  #     - 'gcr.io/$PROJECT_ID/document-intelligence-backend:$COMMIT_SHA'
  #     - '--region'
  #     - 'us-central1'
  #     - '--platform'
  #     - 'managed'
  #     - '--allow-unauthenticated'
  #     - '--set-env-vars'
  #     - 'API_KEY=${_API_KEY},GEMINI_API_KEY=${_GEMINI_API_KEY}'

images:
  - 'gcr.io/$PROJECT_ID/document-intelligence-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/document-intelligence-backend:latest'
  - 'gcr.io/$PROJECT_ID/document-intelligence-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/document-intelligence-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
